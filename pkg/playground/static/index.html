<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexScript Playground</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --surface: #181825;
      --border: #313244;
      --text: #cdd6f4;
      --subtext: #a6adc8;
      --accent: #89b4fa;
      --error: #f38ba8;
      --success: #a6e3a1;
      --keyword: #cba6f7;
      --number: #fab387;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
    }
    header .subtitle {
      color: var(--subtext);
      font-size: 0.85rem;
    }
    .toolbar {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .toolbar select, .toolbar button {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .toolbar button {
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
      border: none;
    }
    .toolbar button:hover {
      opacity: 0.9;
    }
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr auto;
      gap: 0;
      overflow: hidden;
    }
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-header .tab {
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 4px;
    }
    .panel-header .tab.active {
      background: var(--border);
      color: var(--text);
    }
    .editor-panel {
      border-right: 1px solid var(--border);
    }
    #editor {
      flex: 1;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: none;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 4;
    }
    #output {
      flex: 1;
      overflow: auto;
      padding: 16px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }
    #output.markdown-view {
      white-space: pre-wrap;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
    }
    #output.fsm-view {
      text-align: center;
    }
    #output.fsm-view svg {
      max-width: 100%;
      height: auto;
    }
    .diagnostics {
      grid-column: 1 / -1;
      background: var(--surface);
      border-top: 1px solid var(--border);
      max-height: 160px;
      overflow-y: auto;
      padding: 8px 16px;
      font-family: monospace;
      font-size: 12px;
    }
    .diagnostics .title {
      color: var(--subtext);
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .diag-item {
      padding: 2px 0;
      color: var(--error);
    }
    .diag-item.success {
      color: var(--success);
    }
    .status {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .status.ok { background: rgba(166,227,161,0.15); color: var(--success); }
    .status.err { background: rgba(243,139,168,0.15); color: var(--error); }
  </style>
</head>
<body>
  <header>
    <h1>LexScript Playground</h1>
    <span class="subtitle">Write, compile, and preview legal contracts as finite state machines</span>
    <div class="toolbar">
      <select id="jurisdiction">
        <option value="common">Common Law</option>
        <option value="delaware">Delaware</option>
        <option value="california">California</option>
        <option value="uk">UK</option>
      </select>
      <button id="compileBtn" onclick="compile()">&#9654; Compile</button>
    </div>
  </header>

  <div class="main">
    <!-- Editor -->
    <div class="panel editor-panel">
      <div class="panel-header">Editor</div>
      <textarea id="editor" spellcheck="false">// Example: Simple Rental Contract
contract RentalAgreement {
    party Landlord;
    party Tenant;

    amount rent = 1500.00 USD;
    amount deposit = 3000.00 USD;
    time_limit lease_period = 12 months;
    time_limit notice_period = 30 days;
    date start_date = 2025-07-01;

    state DepositPayment {
        require Tenant pays deposit;
        transition PaymentReceived -> LeaseActive;
        transition breach(Tenant) -> DepositBreached;
    }

    state LeaseActive {
        require Tenant pays rent;
        require Landlord provides property_access;
        transition time_limit(lease_period) -> LeaseEnd;
        transition breach(Tenant) -> TenantBreached;
    }

    state LeaseEnd {
        require Tenant returns property;
        require Landlord returns deposit;
        transition PropertyReturned -> Fulfilled;
    }

    state Fulfilled {
        terminate fulfilled;
    }

    state TenantBreached {
        terminate breached;
    }

    state DepositBreached {
        terminate breached;
    }
}</textarea>
    </div>

    <!-- Output -->
    <div class="panel">
      <div class="panel-header">
        <span class="tab active" id="tabMarkdown" onclick="showTab('markdown')">Markdown</span>
        <span class="tab" id="tabFsm" onclick="showTab('fsm')">FSM Graph</span>
        <span id="statusBadge" class="status" style="margin-left: auto;"></span>
      </div>
      <div id="output" class="markdown-view"></div>
    </div>

    <!-- Diagnostics -->
    <div class="diagnostics">
      <div class="title">Problems</div>
      <div id="diagList"><span class="diag-item success">Ready — press Compile or Ctrl+Enter</span></div>
    </div>
  </div>

  <!-- viz.js for FSM rendering -->
  <script src="https://unpkg.com/@viz-js/viz@3.4.0/lib/viz-standalone.js"></script>
  <script src="app.js"></script>
</body>
</html>
